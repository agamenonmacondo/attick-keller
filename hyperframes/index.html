<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attick & Keller — Promocional</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #3E2723; overflow: hidden; }
  </style>
</head>
<body>

  <!-- Promo title: 0s – 6s -->
  <div
    id="el-promo"
    data-composition-id="promo-title"
    data-composition-src="compositions/promo-title.html"
    data-start="0"
    data-duration="6"
    data-track-index="1"
    data-width="1920"
    data-height="1080"
  ></div>

  <!-- Menu showcase: 5.4s – 12s -->
  <div
    id="el-menu"
    data-composition-id="menu-showcase"
    data-composition-src="compositions/menu-showcase.html"
    data-start="5.4"
    data-duration="6"
    data-track-index="2"
    data-width="1920"
    data-height="1080"
  ></div>

  <!-- Reservation CTA: 11.4s – 18s -->
  <div
    id="el-cta"
    data-composition-id="reservation-cta"
    data-composition-src="compositions/reservation-cta.html"
    data-start="11.4"
    data-duration="6"
    data-track-index="3"
    data-width="1920"
    data-height="1080"
  ></div>

  <!-- Transitions -->
  <!-- Promo → Menu: dissolve at 5.0s -->
  <div
    id="tr-promo-menu"
    data-composition-id="transition-dissolve"
    data-start="5.0"
    data-duration="0.8"
    data-track-index="0"
    data-width="1920"
    data-height="1080"
    style="position:absolute;inset:0;"
  >
    <style>
      [data-composition-id="transition-dissolve"] {
        background: transparent;
      }
    </style>
  </div>

  <!-- Menu → CTA: dissolve at 11.0s -->
  <div
    id="tr-menu-cta"
    data-composition-id="transition-dissolve-2"
    data-start="11.0"
    data-duration="0.8"
    data-track-index="0"
    data-width="1920"
    data-height="1080"
    style="position:absolute;inset:0;"
  >
    <style>
      [data-composition-id="transition-dissolve-2"] {
        background: transparent;
      }
    </style>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    // Transition 1: fade promo out, menu fades in via its own entrance animations
    const tr1 = gsap.timeline({ paused: true });
    // The dissolve is handled by overlapping tracks — menu entrance animations create the crossfade
    window.__timelines["transition-dissolve"] = tr1;

    // Transition 2: menu to CTA
    const tr2 = gsap.timeline({ paused: true });
    window.__timelines["transition-dissolve-2"] = tr2;
  </script>
</body>
</html>
