<div data-composition-id="reservation-cta" data-start="0" data-duration="5.5" data-width="1920" data-height="1080">

  <!-- Background -->
  <div style="position:absolute;inset:0;background-color:#3E2723;"></div>
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(107,39,55,0.15) 0%, transparent 60%);"></div>

  <!-- Content -->
  <div style="width:100%;height:100%;padding:160px 200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;box-sizing:border-box;text-align:center;">

    <!-- Decorative top line -->
    <div class="top-line" style="width:60px;height:3px;background-color:#E8A83E;border-radius:2px;"></div>

    <!-- CTA heading -->
    <h2 class="cta-title" style="font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:#F5EDE0;line-height:1;margin:0;">Reserva tu Mesa</h2>

    <!-- Tagline -->
    <p class="cta-subtitle" style="font-family:'DM Sans',sans-serif;font-size:24px;font-weight:400;color:#EFEBE9;max-width:600px;line-height:1.5;margin:0;">Una experiencia mediterránea en cada visita. Vino, cerveza artesanal y cocina de corazón.</p>

    <!-- Divider -->
    <div class="divider" style="width:40px;height:2px;background-color:#C9A94E;border-radius:1px;margin:8px 0;"></div>

    <!-- Hours -->
    <div class="hours-block" style="display:flex;gap:64px;margin-top:12px;">
      <div>
        <p style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#BCAAA4;margin:0 0 8px 0;">Almuerzo</p>
        <p style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#F5EDE0;margin:0;">12:00 — 15:00</p>
      </div>
      <div>
        <p style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:#BCAAA4;margin:0 0 8px 0;">Cena</p>
        <p style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#F5EDE0;margin:0;">18:00 — 22:00</p>
      </div>
    </div>

    <!-- Phone -->
    <p class="phone" style="font-family:'DM Sans',sans-serif;font-size:20px;font-weight:500;color:#E8A83E;margin-top:16px;">+57 312 345 6789</p>

    <!-- Hand-drawn accent -->
    <p class="handwritten" style="font-family:'Caveat',cursive;font-size:22px;color:#8FBF6A;margin:0;">te esperamos</p>
  </div>

  <style>
    [data-composition-id="reservation-cta"] {
      overflow: hidden;
    }
    .cta-title, .cta-subtitle, .top-line, .divider, .hours-block, .phone, .handwritten {
      will-change: transform, opacity;
      opacity: 0;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });

    // Staggered entrance
    tl.from(".top-line", { scaleX: 0, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.2);
    tl.from(".cta-title", { y: 50, opacity: 0, duration: 0.7, ease: "power3.out" }, 0.4);
    tl.from(".cta-subtitle", { y: 30, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.8);
    tl.from(".divider", { scaleX: 0, opacity: 0, duration: 0.4, ease: "power3.out" }, 1.1);
    tl.from(".hours-block", { y: 30, opacity: 0, duration: 0.6, ease: "power2.out" }, 1.3);
    tl.from(".phone", { y: 20, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.6);
    tl.from(".handwritten", { y: 15, opacity: 0, duration: 0.5, ease: "power2.out" }, 1.8);

    // Subtle ambient float on title
    tl.to(".cta-title", { y: -3, duration: 2.5, ease: "sine.inOut", yoyo: true, repeat: 1 }, 2.5);

    window.__timelines["reservation-cta"] = tl;
  </script>
</div>
